resources:
- ../../base

patches:
- patch: |-
    - op: replace
      path: /metadata/name
      value: stgbankapp-ingress
    - op: replace
      path: /spec/rules/0/host
      value: test2.alphareds.com
    - op: replace
      path: /spec/rules/0/http/paths/0/backend/service/name
      value: stgbankapp-service
  target:
    kind: Ingress
    name: bankapp-ingress
- patch: |-
    - op: replace
      path: /metadata/name
      value: stgbankapp-service
  target:
    kind: Service
    name: bankapp-service
- patch: |-
    - op: replace
      path: /metadata/name
      value: stgbankapp
  target:
    kind: Deployment
    name: bankapp
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
images:
- name: thuyein97/bankapp
  newName: docker.io/thuyein97/bankapp
  newTag: 107d464
