name: CICD Pipeline 

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:
permissions:
  id-token: write
  contents: write   # required to push updated image tag to staging kustomization
  packages: write
  security-events: write
concurrency:
  group: production-deploy
  cancel-in-progress: true
jobs:
  compile:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build with Maven
      run: mvn compile
      
  security-check:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    - name: Run Trivy scanner
      uses: aquasecurity/trivy-action@v0.20.0
      with:
        scan-type: fs
        severity: CRITICAL,HIGH
        exit-code: 0
        format: sarif
        scan-ref: '.'
        output: 'trivy-fs-results.sarif'

    - name: Upload results to GitHub Security
      uses: github/codeql-action/upload-sarif@v4
      if: always() # Ensures results upload even if vulnerabilities are found
      with:
        sarif_file: 'trivy-fs-results.sarif'
        category: trivy-fs

    - name: Run Gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        format: sarif
        report-path: gitleaks.sarif
        exit-code: 1 # Fails the build if a secret is found

    - name: Upload Gitleaks results
      uses: github/codeql-action/upload-sarif@v4 # Use v4 to avoid the deprecation warning
      if: always() && hashFiles('gitleaks.sarif') != ''
      with:
        sarif_file: gitleaks.sarif
        category: gitleaks

  test:
    runs-on: ubuntu-latest
    needs: security-check
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Unit Test Cases
      run: mvn test

  build_project_and_sonar_scan:
    runs-on: ubuntu-latest
    needs: test
    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven
    - name: Build Project
      run: mvn package
    - name: Upload JAR artifact
      uses: actions/upload-artifact@v4
      with:
        name: app-jar
        path: target/*.jar 
        
    # - uses: actions/checkout@v4
    #   with:
    #     # Disabling shallow clones is recommended for improving the relevancy of reporting
    #     fetch-depth: 0
    # - name: SonarQube Scan
    #   uses: SonarSource/sonarqube-scan-action@v5.0.0 # Ex: v4.1.0, See the latest version at https://github.com/marketplace/actions/official-sonarqube-scan
    #   env:
    #     SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #     SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
        
    # - name: SonarQube Quality Gate check
    #   id: sonarqube-quality-gate-check
    #   uses: sonarsource/sonarqube-quality-gate-action@master
    #   with:
    #     pollingTimeoutSec: 600
    #   env:
    #       SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
    #       SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  buils_docker_image_and_push:
    runs-on: ubuntu-latest
    needs: build_project_and_sonar_scan
    steps:
    - uses: actions/checkout@v4
    - name: Download JAR artifact
      uses: actions/download-artifact@v4
      with:
        name: app-jar
        path: app  # this will download JAR to ./app folder
        
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ vars.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build Docker image (Local Only)
      uses: docker/build-push-action@v6
      with:
        context: .
        push: false # Do not push yet!
        load: true   # This loads the image into the local Docker daemon for Trivy to see
        tags: local-image:test
        file: ./Dockerfile
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Scan Local Docker Image
      uses: aquasecurity/trivy-action@0.20.0
      with:
        image-ref: local-image:test
        severity: CRITICAL,HIGH
        format: 'sarif'
        output: 'trivy-image-results.sarif'
        exit-code: 0 # This will stop the pipeline if vulnerabilities are found

    - name: Upload Scan Results
      uses: github/codeql-action/upload-sarif@v4
      if: always() && hashFiles('trivy-image-results.sarif') != ''
      with:
        sarif_file: 'trivy-image-results.sarif'
        category: trivy-image

    - name: Push Docker image (Only if scan passed)
      uses: docker/build-push-action@v6
      # This step only runs if the previous steps (including the scan) succeeded
      with:
        context: .
        push: true
        tags: |
          ${{ vars.namespace }}/${{ vars.image }}:${{ github.sha }}
          ${{ vars.namespace }}/${{ vars.image }}:latest
        file: ./Dockerfile

    

