  deploy_to_kubernetes_staging:
    runs-on: ubuntu-latest
    needs: buils_docker_image_and_push
    environment:
      name: staging
    env:
      REGISTRY: ${{ vars.registry }}
      NAMESPACE: ${{ vars.namespace }}
      IMAGE: ${{ vars.image }}
      TAG: ${{ needs.buils_docker_image_and_push.outputs.image_tag }}

    steps:
    - name: Checkout ArgoCD GitOps repo
      uses: actions/checkout@v4
      with:
        repository: ${{ vars.GITOPS_REPO || 'thuyein97/amazon-argocd' }}
        token: ${{ secrets.GITOPS_PAT }}
        path: gitops

    - name: Setup Kustomize
      uses: imranismail/setup-kustomize@v2

    - name: Bump staging image tag in ArgoCD GitOps
      working-directory: gitops/apps/bankapp-staging
      run: |
        set -euo pipefail
        kustomize edit set image "docker.io/${NAMESPACE}/${IMAGE}:${TAG}"

    - name: Commit and push ArgoCD GitOps (staging)
      working-directory: gitops
      run: |
        set -euo pipefail
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        if git diff --quiet; then
          echo "No image tag change for staging; skipping push."
          exit 0
        fi
        git add apps/bankapp-staging/kustomization.yaml
        git commit -m "chore(bankapp-staging): promote image ${TAG}"
        git push

